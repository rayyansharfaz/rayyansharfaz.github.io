<div style="text-align:center; font-family: sans-serif; margin-top: 50px;">
  <div style="font-size: 48px;">🦠</div>
  <h2>Taking Control of your phone</h2>
  <p id="status">Malicious</p>
  <button id="downloadBtn" style="display:none; padding: 12px 24px; font-size: 16px; background:#d9534f; color:white; border:none; border-radius:6px; cursor:pointer;">
    Remove Virus Now
  </button>
</div>

<script>
  // simulate a short "loading" delay before revealing the button
  setTimeout(() => {
    document.getElementById("status").textContent = "Threat detected. Click below to resolve.";
    document.getElementById("downloadBtn").style.display = "inline-block";
  }, 1500);

  document.getElementById("downloadBtn").addEventListener("click", function () {
    const content = "helloheee";
    const blob = new Blob([content], { type: "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "scammy.txt";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });
</script>
