<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Awareness Demo</title>
<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
}
.box{
    width:360px;
    background:#222;
    padding:24px;
    border-radius:12px;
    text-align:center;
}
.progress{
    width:100%;
    height:20px;
    background:#444;
    border-radius:10px;
    overflow:hidden;
    margin:20px 0;
}
.bar{
    width:0%;
    height:100%;
    background:#00c853;
    transition:width .1s linear;
}
</style>
</head>
<body>
<div class="box">
    <div style="font-size:60px;">🦠</div>
    <h2>Taking Control of your phone</h2>
    <p id="status">Preparing simulation...</p>
    <div class="progress"><div class="bar" id="bar"></div></div>
</div>

<script>
let p = 0;
const bar = document.getElementById("bar");
const status = document.getElementById("status");

const timer = setInterval(() => {
    p++;
    bar.style.width = p + "%";
    status.textContent = "Progress: " + p + "%";

    if (p >= 100) {
        clearInterval(timer);
        status.textContent = "Your phone is being taken control.";
    }
}, 50);
</script>
</body>
</html>
